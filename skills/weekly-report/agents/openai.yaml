interface:
  display_name: "Weekly Report"
  short_description: "Log work entries and generate weekly reports (.xlsx) on demand"
  default_prompt: "Use this skill when the user wants to log work activities, edit past entries, or generate a weekly report. Author is an SSD test engineer; polish content professionally but never invent facts. Default data root is ~/Documents/WeeklyNotes/ (notes/ and reports/ subdirs only — no logs/, no HTML output). The user can switch the per-session root in-chat with phrases like \"用 [path] 当根目录\" or \"切回默认\", supporting arbitrary paths such as an Obsidian vault at /Users/jarvs/Documents/obsidian-notes/WeeklyNotes. After a path switch, all reads/writes/echoes go to the new root. Produces a styled .xlsx weekly summary at [current-root]/reports/YYYY-MM-Www/. Always confirm next-week plan with the user before writing it to disk.\n\n**On every new session, before the first work entry / first weekly report, confirm the data root by reading the WEEKLY_NOTES_DIR environment variable** (priority: session-level override > env > platform default ~/Documents/WeeklyNotes/). If env is set, echo the absolute path once and proceed. If env is not set, show a one-time prompt with platform-specific setup commands (export WEEKLY_NOTES_DIR=... for macOS/Linux, [System.Environment]::SetEnvironmentVariable for Windows) and ask whether to use the platform default for this session, switch to a new path, or set the env first. This check runs exactly once per session — never re-ask. If the user\'s first message is already a work entry, skip the prompt and silently use the platform default, but append a one-liner hint to the echo."
