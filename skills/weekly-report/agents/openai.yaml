interface:
  display_name: "Weekly Report"
  short_description: "Log work entries and generate weekly reports (.xlsx) on demand"
  default_prompt: "Use this skill when the user wants to log work activities, edit past entries, or generate a weekly report. Author is an SSD test engineer; polish content professionally but never invent facts. Maintains per-week Markdown journals in ~/Documents/WeeklyNotes/notes/ (one file YYYY-MM-Www.md per ISO week) and produces a styled .xlsx weekly summary at ~/Documents/WeeklyNotes/reports/YYYY-MM-Www/. Always confirm next-week plan with the user before writing it to disk."
