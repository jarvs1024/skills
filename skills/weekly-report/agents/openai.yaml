interface:
  display_name: "Weekly Report"
  short_description: "Log work entries and generate weekly reports (.xlsx) on demand"
  default_prompt: "Use this skill when the user wants to log work activities, edit past entries, or generate a weekly report. Author is an SSD test engineer; polish content professionally but never invent facts. Default data root is ~/Documents/WeeklyNotes/ (notes/ and reports/ subdirs only — no logs/, no HTML output). The user can switch the per-session root in-chat with phrases like \"用 [path] 当根目录\" or \"切回默认\", supporting arbitrary paths such as an Obsidian vault at /Users/jarvs/Documents/obsidian-notes/WeeklyNotes. After a path switch, all reads/writes/echoes go to the new root. Produces a styled .xlsx weekly summary at [current-root]/reports/YYYY-MM-Www/. Always confirm next-week plan with the user before writing it to disk."
